<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <link rel="icon" type="image/x-icon" href="https://mishpms.hpisd.org/favicon.ico">
    <div id="game-wrapper">
        <aside id="sidebar">
            <h2>Deck Tracker</h2>
            <p>Total Symbols: <span id="deck-count">0</span></p>
            <div id="inventory-grid"></div>
        </aside>

        <main id="main-content">
            <header id="hud">
                <div class="stat-box">💰 GOLD: <span id="gold">0</span></div>
                <div class="stat-box" id="rent-box">🏠 RENT DUE: <span id="rent">25</span></div>
                <div class="stat-box">🔄 SPINS LEFT: <span id="spins">5</span></div>
                <button id="clear-save-btn" style="background-color: #ff4444; color: white; margin-top: 10px;">Reset Run</button>
            </header>

            <div id="slot-machine">
                <div id="grid" class="grid-5x5"></div>
            </div>

            <div id="controls">
                <button id="spin-btn">GIMME UR MONEY</button>
                <div id="log-console">Spin the wheel to begin.</div>
            </div>
        </main>

        <div id="shop-modal" class="modal hidden">
            <div class="modal-box">
                <h2>Draft a Symbol</h2>
                <p>Choose one to add to your deck.</p>
                <div id="shop-options"></div>
                <button id="skip-btn" class="secondary-btn">Skip (+ $1)</button>
            </div>
        </div>
    </div>
    
    <script src="engine.js"></script>
</body>
</html>
